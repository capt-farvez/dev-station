<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#18181b"/>
  <circle cx="600" cy="280" r="90" fill="#4c1d95" opacity="0.5"/>
  <circle cx="600" cy="280" r="70" fill="#7c3aed" opacity="0.5"/>
  <!-- Spaceship icon -->
  <g transform="translate(600, 275)">
    <!-- Ship body -->
    <path d="M0,-40 L-25,15 L-15,15 L-15,25 L15,25 L15,15 L25,15Z" fill="white" opacity="0.9"/>
    <!-- Cockpit window -->
    <ellipse cx="0" cy="-10" rx="8" ry="10" fill="#8b5cf6"/>
    <!-- Wings detail -->
    <path d="M-25,15 L-35,25 L-15,20Z" fill="#a78bfa" opacity="0.8"/>
    <path d="M25,15 L35,25 L15,20Z" fill="#a78bfa" opacity="0.8"/>
    <!-- Engine glow -->
    <ellipse cx="-8" cy="28" rx="4" ry="8" fill="#f59e0b" opacity="0.7"/>
    <ellipse cx="8" cy="28" rx="4" ry="8" fill="#f59e0b" opacity="0.7"/>
    <ellipse cx="-8" cy="28" rx="2" ry="5" fill="#fbbf24"/>
    <ellipse cx="8" cy="28" rx="2" ry="5" fill="#fbbf24"/>
  </g>
  <!-- Stars -->
  <circle cx="480" cy="220" r="2" fill="white" opacity="0.5"/>
  <circle cx="720" cy="240" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="540" cy="340" r="1" fill="white" opacity="0.3"/>
  <circle cx="660" cy="200" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="520" cy="260" r="1" fill="white" opacity="0.3"/>
  <circle cx="680" cy="320" r="2" fill="white" opacity="0.4"/>
  <!-- Project name -->
  <text x="600" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="white">Space Invaders</text>
  <text x="600" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#a1a1aa">Classic Arcade Game</text>
  <!-- Accent line -->
  <rect x="500" y="490" width="200" height="3" rx="2" fill="#8b5cf6"/>
</svg>