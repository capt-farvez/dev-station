<svg width="1200" height="675" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#18181b"/>
  <!-- Accent circle -->
  <circle cx="600" cy="260" r="80" fill="#8b5cf6" opacity="0.15"/>
  <!-- 3D cube with crosshair icon -->
  <g transform="translate(600, 260)" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- 3D cube -->
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6"/>
    <line x1="0" y1="-28" x2="0" y2="28"/>
    <line x1="-24" y1="-14" x2="24" y2="14"/>
    <line x1="24" y1="-14" x2="-24" y2="14"/>
    <!-- Crosshair outer -->
    <circle cx="0" cy="0" r="38" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <!-- Crosshair lines -->
    <line x1="0" y1="-44" x2="0" y2="-32" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="32" x2="0" y2="44" stroke-width="2" opacity="0.7"/>
    <line x1="-44" y1="0" x2="-32" y2="0" stroke-width="2" opacity="0.7"/>
    <line x1="32" y1="0" x2="44" y2="0" stroke-width="2" opacity="0.7"/>
  </g>
  <!-- Project name -->
  <text x="600" y="390" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700">3D Shooter</text>
  <!-- Subtitle -->
  <text x="600" y="425" text-anchor="middle" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="18">Interactive 3D Scene with OpenGL</text>
  <!-- Accent line -->
  <rect x="560" y="445" width="80" height="3" rx="1.5" fill="#8b5cf6" opacity="0.6"/>
</svg>