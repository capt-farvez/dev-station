<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#18181b"/>
  <circle cx="600" cy="280" r="90" fill="#4c1d95" opacity="0.5"/>
  <circle cx="600" cy="280" r="70" fill="#7c3aed" opacity="0.5"/>
  <!-- Snake pattern -->
  <g transform="translate(600, 275)">
    <!-- Snake body segments following a curved path -->
    <rect x="-40" y="-10" width="14" height="14" rx="3" fill="#22c55e" opacity="0.7"/>
    <rect x="-24" y="-10" width="14" height="14" rx="3" fill="#4ade80" opacity="0.8"/>
    <rect x="-8" y="-10" width="14" height="14" rx="3" fill="#4ade80" opacity="0.8"/>
    <rect x="8" y="-10" width="14" height="14" rx="3" fill="#4ade80" opacity="0.85"/>
    <rect x="8" y="-26" width="14" height="14" rx="3" fill="#4ade80" opacity="0.85"/>
    <rect x="8" y="-42" width="14" height="14" rx="3" fill="#86efac" opacity="0.9"/>
    <rect x="24" y="-42" width="14" height="14" rx="3" fill="#bbf7d0" opacity="0.95"/>
    <!-- Snake head -->
    <rect x="40" y="-42" width="16" height="16" rx="4" fill="white" opacity="0.95"/>
    <!-- Eyes -->
    <circle cx="48" cy="-37" r="2.5" fill="#18181b"/>
    <circle cx="53" cy="-37" r="2.5" fill="#18181b"/>
    <!-- Food item -->
    <circle cx="-30" cy="-35" r="6" fill="#ef4444" opacity="0.8"/>
    <circle cx="-30" cy="-35" r="3" fill="#fca5a5" opacity="0.5"/>
    <!-- Grid dots for game board feel -->
    <circle cx="-40" cy="-40" r="1" fill="#3f3f46" opacity="0.4"/>
    <circle cx="-40" cy="20" r="1" fill="#3f3f46" opacity="0.4"/>
    <circle cx="40" cy="20" r="1" fill="#3f3f46" opacity="0.4"/>
    <circle cx="-10" cy="20" r="1" fill="#3f3f46" opacity="0.4"/>
    <circle cx="20" cy="20" r="1" fill="#3f3f46" opacity="0.4"/>
  </g>
  <!-- Project name -->
  <text x="600" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="white">Snake Game</text>
  <text x="600" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#a1a1aa">Classic Snake Arcade Game</text>
  <!-- Accent line -->
  <rect x="500" y="490" width="200" height="3" rx="2" fill="#8b5cf6"/>
</svg>