<svg width="1200" height="675" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#18181b"/>
  <circle cx="600" cy="260" r="80" fill="#10b981" opacity="0.15"/>
  <!-- Bank/money icon -->
  <g transform="translate(600,260)" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bank roof (triangle) -->
    <polygon points="0,-35 35,-15 -35,-15" fill="#10b981" opacity="0.2" stroke="#10b981"/>
    <!-- Bank top bar -->
    <rect x="-32" y="-15" width="64" height="5" fill="#10b981" opacity="0.3" stroke="none"/>
    <!-- Pillars -->
    <line x1="-22" y1="-10" x2="-22" y2="15"/>
    <line x1="-8" y1="-10" x2="-8" y2="15"/>
    <line x1="8" y1="-10" x2="8" y2="15"/>
    <line x1="22" y1="-10" x2="22" y2="15"/>
    <!-- Base -->
    <rect x="-32" y="15" width="64" height="5" fill="#10b981" opacity="0.3" stroke="none"/>
    <!-- Dollar coin -->
    <circle cx="0" cy="30" r="8" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="2"/>
    <text x="0" y="34" text-anchor="middle" fill="#10b981" font-family="system-ui" font-size="10" font-weight="700" stroke="none">$</text>
  </g>
  <text x="600" y="390" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700">Banking System</text>
  <text x="600" y="425" text-anchor="middle" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="18">Secure Banking Platform</text>
  <rect x="560" y="445" width="80" height="3" rx="1.5" fill="#10b981" opacity="0.6"/>
</svg>