<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#18181b"/>
  <circle cx="600" cy="280" r="90" fill="#1e3a5f" opacity="0.5"/>
  <circle cx="600" cy="280" r="70" fill="#2563eb" opacity="0.6"/>
  <!-- Note/paper icon -->
  <g transform="translate(600, 275)">
    <!-- Paper -->
    <rect x="-25" y="-35" width="45" height="55" rx="3" fill="white" opacity="0.9"/>
    <!-- Folded corner -->
    <path d="M20,-35 L20,-20 L5,-35Z" fill="#a1a1aa" opacity="0.5"/>
    <path d="M5,-35 L20,-20 L20,-35Z" fill="#d4d4d8" opacity="0.7"/>
    <!-- Lines on paper -->
    <line x1="-17" y1="-18" x2="10" y2="-18" stroke="#a1a1aa" stroke-width="2"/>
    <line x1="-17" y1="-8" x2="12" y2="-8" stroke="#a1a1aa" stroke-width="2"/>
    <line x1="-17" y1="2" x2="8" y2="2" stroke="#a1a1aa" stroke-width="2"/>
    <line x1="-17" y1="12" x2="5" y2="12" stroke="#a1a1aa" stroke-width="2"/>
    <!-- Pencil -->
    <g transform="translate(15, 10) rotate(35)">
      <rect x="-3" y="-30" width="6" height="35" rx="1" fill="#fbbf24"/>
      <polygon points="-3,5 3,5 0,12" fill="#d4d4d8"/>
      <rect x="-3" y="-30" width="6" height="5" rx="1" fill="#f87171"/>
    </g>
  </g>
  <!-- Project name -->
  <text x="600" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="white">Smart Note</text>
  <text x="600" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#a1a1aa">Desktop Note-Taking App</text>
  <!-- Accent line -->
  <rect x="500" y="490" width="200" height="3" rx="2" fill="#3b82f6"/>
</svg>