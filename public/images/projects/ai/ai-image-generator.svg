<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#18181b"/>
  <circle cx="600" cy="280" r="90" fill="#581c87" opacity="0.5"/>
  <circle cx="600" cy="280" r="70" fill="#7c3aed" opacity="0.6"/>
  <!-- Brain/sparkle icon -->
  <g transform="translate(600, 275)">
    <!-- Brain left hemisphere -->
    <path d="M-5,-30 C-25,-30 -35,-15 -35,0 C-35,10 -30,20 -20,25 C-15,28 -5,28 -5,20" fill="none" stroke="white" stroke-width="3" opacity="0.9"/>
    <path d="M-5,-30 C-25,-28 -40,-5 -30,10" fill="none" stroke="white" stroke-width="2.5" opacity="0.7"/>
    <!-- Brain right hemisphere -->
    <path d="M5,-30 C25,-30 35,-15 35,0 C35,10 30,20 20,25 C15,28 5,28 5,20" fill="none" stroke="white" stroke-width="3" opacity="0.9"/>
    <path d="M5,-30 C25,-28 40,-5 30,10" fill="none" stroke="white" stroke-width="2.5" opacity="0.7"/>
    <!-- Brain stem -->
    <line x1="0" y1="25" x2="0" y2="35" stroke="white" stroke-width="3" opacity="0.9"/>
    <!-- Sparkles -->
    <g fill="#c084fc">
      <polygon points="-45,-20 -42,-15 -38,-20 -42,-25" opacity="0.8"/>
      <polygon points="45,-15 48,-10 52,-15 48,-20" opacity="0.8"/>
      <polygon points="-35,30 -32,35 -28,30 -32,25" opacity="0.6"/>
      <polygon points="38,28 41,33 45,28 41,23" opacity="0.6"/>
      <polygon points="0,-50 3,-44 6,-50 3,-56" opacity="0.7"/>
    </g>
  </g>
  <!-- Project name -->
  <text x="600" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="white">AI Image Generator</text>
  <text x="600" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#a1a1aa">AI-Powered Image Creation</text>
  <!-- Accent line -->
  <rect x="500" y="490" width="200" height="3" rx="2" fill="#a855f7"/>
