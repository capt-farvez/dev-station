  <!-- Shield with checkmark icon -->
  <g transform="translate(600,260)" fill="none" stroke="#14b8a6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Shield -->
    <path d="M0,-35 L28,-22 L28,5 Q28,25 0,38 Q-28,25 -28,5 L-28,-22 Z" fill="#14b8a6" opacity="0.15"/>
    <!-- Checkmark -->
    <polyline points="-12,2 -4,12 14,-8" stroke-width="4"/>
    <!-- Small verification lines -->
    <line x1="-8" y1="-20" x2="8" y2="-20" stroke-width="2" opacity="0.4"/>
  </g>
  <text x="600" y="390" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700">Ashol</text>
  <text x="600" y="425" text-anchor="middle" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="18">Restaurant Verification Platform</text>
  <rect x="560" y="445" width="80" height="3" rx="1.5" fill="#14b8a6" opacity="0.6"/>
</svg>