<svg width="1200" height="675" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#18181b"/>
  <!-- Accent circle -->
  <circle cx="600" cy="260" r="80" fill="#10b981" opacity="0.15"/>
  <!-- Restaurant/utensils icon -->
  <g transform="translate(600, 260)" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Fork -->
    <line x1="-24" y1="-30" x2="-24" y2="30"/>
    <line x1="-24" y1="-30" x2="-24" y2="-10" stroke-width="0"/>
    <line x1="-32" y1="-30" x2="-32" y2="-8"/>
    <line x1="-24" y1="-30" x2="-24" y2="-8"/>
    <line x1="-16" y1="-30" x2="-16" y2="-8"/>
    <path d="M-34,-8 Q-24,2 -14,-8" fill="none"/>
    <!-- Knife -->
    <path d="M8,-30 Q20,-20 20,-8 L8,-8 Z" fill="#10b981" opacity="0.3" stroke="#10b981"/>
    <line x1="8" y1="-8" x2="8" y2="30"/>
    <!-- Plate circle -->
    <circle cx="-4" cy="0" r="40" stroke="#10b981" stroke-width="2" fill="none" opacity="0.4"/>
  </g>
  <!-- Project name -->
  <text x="600" y="390" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700">BSS Restaurant Management System</text>
  <!-- Subtitle -->
  <text x="600" y="425" text-anchor="middle" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="18">Full-Stack Restaurant Management</text>
  <!-- Accent line -->
  <rect x="560" y="445" width="80" height="3" rx="1.5" fill="#10b981" opacity="0.6"/>
</svg>
