<svg width="1200" height="675" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#18181b"/>
  <circle cx="600" cy="260" r="80" fill="#f59e0b" opacity="0.15"/>
  <!-- Shopping cart and price tag icon -->
  <g transform="translate(600,260)" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cart body -->
    <path d="M-28,12 L-20,-15 L22,-15 L18,5 L-24,5 Z" fill="#f59e0b" opacity="0.2" stroke="#f59e0b"/>
    <!-- Cart handle -->
    <line x1="-28" y1="12" x2="-35" y2="12"/>
    <!-- Cart wheels -->
    <circle cx="-18" cy="16" r="4" fill="#f59e0b" opacity="0.4"/>
    <circle cx="14" cy="16" r="4" fill="#f59e0b" opacity="0.4"/>
    <!-- Price tag -->
    <rect x="22" y="-30" width="18" height="24" rx="2" fill="#f59e0b" opacity="0.25" stroke="#f59e0b" stroke-width="2" transform="rotate(15,31,-18)"/>
    <circle cx="31" cy="-22" r="2" fill="#f59e0b"/>
    <!-- Dollar sign -->
    <text x="0" y="-2" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="14" font-weight="700" stroke="none">$</text>
  </g>
  <text x="600" y="390" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700">BestDeal</text>
  <text x="600" y="425" text-anchor="middle" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="18">Comparative Shopping Platform</text>
  <rect x="560" y="445" width="80" height="3" rx="1.5" fill="#f59e0b" opacity="0.6"/>
</svg>