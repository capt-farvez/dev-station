<svg width="1200" height="675" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#18181b"/>
  <circle cx="600" cy="260" r="80" fill="#3b82f6" opacity="0.15"/>
  <!-- Graduation cap icon -->
  <g transform="translate(600,260)" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cap top -->
    <polygon points="0,-30 40,-10 0,10 -40,-10" fill="#3b82f6" opacity="0.3" stroke="#3b82f6"/>
    <!-- Tassel line -->
    <line x1="0" y1="-30" x2="0" y2="-45"/>
    <circle cx="0" cy="-48" r="3" fill="#3b82f6"/>
    <!-- Cap brim -->
    <line x1="-40" y1="-10" x2="-40" y2="5"/>
    <line x1="40" y1="-10" x2="40" y2="5"/>
    <path d="M-40,5 Q0,25 40,5" fill="none"/>
    <!-- Book below -->
    <rect x="-20" y="18" width="40" height="6" rx="1" fill="#3b82f6" opacity="0.4"/>
    <rect x="-24" y="26" width="48" height="6" rx="1" fill="#3b82f6" opacity="0.3"/>
  </g>
  <text x="600" y="390" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700">OBEmaster</text>
  <text x="600" y="425" text-anchor="middle" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="18">Outcome-Based Education Management</text>
  <rect x="560" y="445" width="80" height="3" rx="1.5" fill="#3b82f6" opacity="0.6"/>
</svg>