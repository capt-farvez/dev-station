<svg width="1200" height="675" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#18181b"/>
  <circle cx="600" cy="260" r="80" fill="#06b6d4" opacity="0.15"/>
  <!-- Cloud and sun icon -->
  <g transform="translate(600,260)" fill="none" stroke="#06b6d4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Sun rays -->
    <circle cx="15" cy="-20" r="10" fill="#06b6d4" opacity="0.3" stroke="#06b6d4"/>
    <line x1="15" y1="-35" x2="15" y2="-38"/>
    <line x1="15" y1="-5" x2="15" y2="-2"/>
    <line x1="0" y1="-20" x2="-3" y2="-20"/>
    <line x1="30" y1="-20" x2="33" y2="-20"/>
    <line x1="4" y1="-31" x2="2" y2="-33"/>
    <line x1="26" y1="-9" x2="28" y2="-7"/>
    <!-- Cloud -->
    <path d="M-30,10 Q-30,-8 -15,-8 Q-10,-22 5,-15 Q10,-8 8,0 Q20,0 20,10 Q20,18 10,18 L-22,18 Q-30,18 -30,10 Z" fill="#06b6d4" opacity="0.2" stroke="#06b6d4"/>
    <!-- Rain drops -->
    <line x1="-15" y1="24" x2="-18" y2="32"/>
    <line x1="-5" y1="24" x2="-8" y2="32"/>
    <line x1="5" y1="24" x2="2" y2="32"/>
  </g>
  <text x="600" y="390" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700">WeatherSpotter</text>
  <text x="600" y="425" text-anchor="middle" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="18">Web-Based Weather Application</text>
  <rect x="560" y="445" width="80" height="3" rx="1.5" fill="#06b6d4" opacity="0.6"/>
