<svg width="1200" height="675" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#18181b"/>
  <!-- Accent circle -->
  <circle cx="600" cy="260" r="80" fill="#3b82f6" opacity="0.15"/>
  <!-- Connected nodes/containers icon -->
  <g transform="translate(600, 260)" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Connection lines -->
    <line x1="0" y1="-20" x2="-24" y2="14"/>
    <line x1="0" y1="-20" x2="24" y2="14"/>
    <line x1="-24" y1="14" x2="24" y2="14"/>
    <!-- Center hub -->
    <line x1="0" y1="-6" x2="0" y2="-20"/>
    <line x1="0" y1="-6" x2="-24" y2="14"/>
    <line x1="0" y1="-6" x2="24" y2="14"/>
    <!-- Container nodes -->
    <rect x="-10" y="-32" width="20" height="16" rx="3" fill="#3b82f6" opacity="0.2" stroke="#3b82f6"/>
    <rect x="-34" y="8" width="20" height="16" rx="3" fill="#3b82f6" opacity="0.2" stroke="#3b82f6"/>
    <rect x="14" y="8" width="20" height="16" rx="3" fill="#3b82f6" opacity="0.2" stroke="#3b82f6"/>
    <!-- Small dots inside containers -->
    <circle cx="0" cy="-24" r="2" fill="#3b82f6"/>
    <circle cx="-24" cy="16" r="2" fill="#3b82f6"/>
    <circle cx="24" cy="16" r="2" fill="#3b82f6"/>
    <!-- Outer orbit ring -->
    <circle cx="0" cy="-3" r="42" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Project name -->
  <text x="600" y="390" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700">K8s Microservices</text>
  <!-- Subtitle -->
  <text x="600" y="425" text-anchor="middle" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="18">Kubernetes Microservices Demo</text>
  <!-- Accent line -->
  <rect x="560" y="445" width="80" height="3" rx="1.5" fill="#3b82f6" opacity="0.6"/>
</svg>