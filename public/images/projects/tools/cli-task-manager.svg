<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#18181b"/>
  <circle cx="600" cy="280" r="90" fill="#7c2d12" opacity="0.5"/>
  <circle cx="600" cy="280" r="70" fill="#ea580c" opacity="0.5"/>
  <!-- Terminal icon -->
  <g transform="translate(600, 275)">
    <!-- Terminal window -->
    <rect x="-40" y="-30" width="80" height="60" rx="6" fill="#27272a" stroke="white" stroke-width="2" opacity="0.95"/>
    <!-- Title bar -->
    <rect x="-40" y="-30" width="80" height="14" rx="6" fill="#3f3f46" opacity="0.9"/>
    <rect x="-40" y="-22" width="80" height="6" fill="#3f3f46" opacity="0.9"/>
    <!-- Title bar dots -->
    <circle cx="-30" cy="-23" r="2.5" fill="#ef4444" opacity="0.8"/>
    <circle cx="-22" cy="-23" r="2.5" fill="#fbbf24" opacity="0.8"/>
    <circle cx="-14" cy="-23" r="2.5" fill="#22c55e" opacity="0.8"/>
    <!-- Prompt line 1 -->
    <text x="-30" y="-4" font-family="monospace" font-size="10" fill="#f97316" opacity="0.9">$</text>
    <text x="-20" y="-4" font-family="monospace" font-size="10" fill="#d4d4d8" opacity="0.8">task list</text>
    <!-- Prompt line 2 -->
    <text x="-30" y="10" font-family="monospace" font-size="10" fill="#22c55e" opacity="0.8">+</text>
    <text x="-20" y="10" font-family="monospace" font-size="9" fill="#a1a1aa" opacity="0.7">3 tasks done</text>
    <!-- Cursor -->
    <rect x="-30" y="18" width="6" height="10" fill="#f97316" opacity="0.7"/>
  </g>
  <!-- Project name -->
  <text x="600" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="white">CLI Task Manager</text>
  <text x="600" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#a1a1aa">Command-Line Task Tool</text>
  <!-- Accent line -->
  <rect x="500" y="490" width="200" height="3" rx="2" fill="#f97316"/>
</svg>